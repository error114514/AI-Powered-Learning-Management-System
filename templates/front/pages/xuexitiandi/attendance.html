<!DOCTYPE html>
<html>
<head lang="en">
<meta charset="utf-8">
<title>教师人脸识别签到</title>
<meta name="keywords" content="" />
<meta name="description" content="" />
<meta name="renderer" content="webkit">
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="../../layui/css/layui.css">
<link rel="stylesheet" href="../../xznstatic/css/common.css"/>
<link rel="stylesheet" href="../../xznstatic/css/style.css"/>
<script type="text/javascript" src="../../xznstatic/js/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../xznstatic/js/jquery.SuperSlide.2.1.1.js"></script>
</head>
<style>
html::after {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    bottom: 0;
    content: '';
    display: block;
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
}

#teacher-face-sign-in {
    max-width: 800px;
    margin: 50px auto;
    padding: 20px;
    background-color: rgba(255, 255, 255, 0.9);
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
}

.sign-in-header {
    text-align: center;
    margin-bottom: 30px;
}

.sign-in-header h2 {
    color: #333;
    font-size: 24px;
}

.sign-in-content {
    text-align: center;
}

.upload-area {
    border: 2px dashed #ccc;
    border-radius: 10px;
    padding: 30px;
    margin: 20px 0;
    cursor: pointer;
    transition: all 0.3s;
}

.upload-area:hover {
    border-color: #409EFF;
    background-color: rgba(64, 158, 255, 0.05);
}

.upload-area i {
    font-size: 48px;
    color: #409EFF;
    margin-bottom: 15px;
}

.upload-area p {
    color: #666;
    font-size: 16px;
}

.result-panel {
    margin-top: 30px;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

.result-panel.success {
    background-color: rgba(92, 184, 92, 0.1);
    border: 1px solid rgba(92, 184, 92, 0.3);
}

.result-panel.error {
    background-color: rgba(217, 83, 79, 0.1);
    border: 1px solid rgba(217, 83, 79, 0.3);
}

.result-panel h3 {
    margin-bottom: 15px;
    font-size: 18px;
}

.result-panel .student-list {
    text-align: left;
    max-height: 300px;
    overflow-y: auto;
}

.result-panel .student-item {
    padding: 10px;
    margin-bottom: 10px;
    background-color: rgba(255, 255, 255, 0.8);
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.result-panel .student-item .student-name {
    font-weight: bold;
}

.result-panel .student-item .student-status {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
}

.result-panel .student-item .status-signed {
    background-color: rgba(92, 184, 92, 0.2);
    color: #2e7d32;
}

.result-panel .student-item .status-unmatched {
    background-color: rgba(217, 83, 79, 0.2);
    color: #c62828;
}

.loading {
    display: none;
    text-align: center;
    padding: 20px;
}

.loading i {
    font-size: 24px;
    color: #409EFF;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
<body>
<div id="app" v-cloak>

    <div id="teacher-face-sign-in">
        <div class="sign-in-header">
            <h2>教师人脸识别签到</h2>
            <p>请上传图片或视频，系统将自动识别并匹配课程学生</p>
        </div>

        <div class="sign-in-content">
            <div class="upload-area" @click="openFileSelector">
                <i class="layui-icon layui-icon-upload"></i>
                <p>点击上传图片或视频</p>
                <input type="file" ref="fileInput" @change="handleFileUpload" accept="image/*,video/*" style="display: none;">
            </div>

            <div class="loading" v-if="loading">
                <i class="layui-icon layui-icon-loading"></i>
                <span>正在识别中，请稍候...</span>
            </div>

            <div class="result-panel" :class="resultClass" v-if="showResult">
                <h3>{{ resultTitle }}</h3>
                <div class="student-list" v-if="matchedStudents.length > 0">
                    <div class="student-item" v-for="(student, index) in matchedStudents" :key="index">
                        <span class="student-name">{{ student.name }}</span>
                        <span class="student-status status-signed">已签到</span>
                    </div>
                </div>
                <div class="student-list" v-if="unmatchedStudents.length > 0">
                    <div class="student-item" v-for="(student, index) in unmatchedStudents" :key="index">
                        <span class="student-name">{{ student.name }}</span>
                        <span class="student-status status-unmatched">未匹配</span>
                    </div>
                </div>
                <div v-if="matchedStudents.length === 0 && unmatchedStudents.length === 0">
                    <p>未找到符合条件的学生</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script type="text/javascript">
    var vue = new Vue({
        el: '#app',
        data: {
            loading: false,
            showResult: false,
            resultClass: '',
            resultTitle: '',
            matchedStudents: [],
            unmatchedStudents: [],
            currentCourseId: null
        },
        methods: {
            openFileSelector() {
                this.$refs.fileInput.click();
            },

            handleFileUpload(event) {
                const file = event.target.files[0];
                if (!file) return;

                this.loading = true;
                this.showResult = false;

                const formData = new FormData();
                formData.append('file', file);

                // 获取当前课程ID（假设从URL参数或session中获取）
                this.currentCourseId = getCourseIdFromUrl(); // 需要实现这个函数

                // 调用教师人脸识别签到API
                $.ajax({
                    url: '/api/courses/' + this.currentCourseId + '/teacher_face_sign_in',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: (response) => {
                        this.loading = false;

                        if (response.code === 0) {
                            this.showResult = true;
                            this.resultClass = 'success';
                            this.resultTitle = '签到成功 - 匹配到 ' + response.data.total_matched + ' 名学生';

                            this.matchedStudents = response.data.matched_students || [];
                            this.unmatchedStudents = response.data.unmatched_students || [];
                        } else {
                            this.showResult = true;
                            this.resultClass = 'error';
                            this.resultTitle = '签到失败';

                            if (response.msg === '未找到符合条件的学生') {
                                this.resultTitle = '未找到符合条件的学生';
                            } else {
                                this.resultTitle = '签到失败: ' + response.msg;
                            }
                        }
                    },
                    error: (xhr, status, error) => {
                        this.loading = false;
                        this.showResult = true;
                        this.resultClass = 'error';
                        this.resultTitle = '签到失败: 网络错误';
                        console.error('签到请求失败:', error);
                    }
                });
            },

            getCourseIdFromUrl() {
                // 从URL中获取课程ID，需要根据实际URL结构调整
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('course_id') || 1; // 默认值1，需要根据实际情况调整
            }
        }
    });

    layui.use(['layer', 'element'], function() {
        var layer = layui.layer;
        var element = layui.element;
    });
</script>
</body>
</html>
