<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
		<meta http-equiv="Pragma" content="no-cache">
		<meta http-equiv="Expires" content="0">
		<title>智能化学习管理系统 - 学生注册</title>
		<!-- 必须最先加载：隐藏整个页面直到完全就绪，防止任何闪现 -->
		<style type="text/css">
			/* 基础样式，确保背景和布局优先加载 */
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				overflow: hidden;
			}

			/* 预加载背景，确保背景图先加载 */
			body {
				background: linear-gradient(135deg, #1976d2 0%, #42a5f5 100%);
				background-attachment: fixed;
				opacity: 0;
				visibility: hidden;
			}

			body.register-ready {
				opacity: 1;
				visibility: visible;
				transition: opacity 0.3s ease-out;
			}

			/* 骨架屏样式 */
			.skeleton {
				background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0e0 75%);
				background-size: 200% 100%;
				animation: skeleton-loading 1.5s infinite;
			}

			@keyframes skeleton-loading {
				0% {
					background-position: 200% 0;
				}
				100% {
					background-position: -200% 0;
				}
			}

			/* 统一背景，避免与 login.css 冲突导致闪现 */
			.register {
				display: flex !important;
				justify-content: center !important;
				align-items: center !important;
			    width: 100% !important;
			    height: 100% !important;
				min-height: 100vh !important;
				background: linear-gradient(135deg, #1976d2 0%, #42a5f5 100%) !important;
				background-attachment: fixed !important;
			}

			.register form {
				box-sizing: border-box;
				min-height: 600px;
				display: flex;
				flex-direction: column;
				justify-content: center !important;
				transform: none;
			}

			.register .logo, .register .title {
				box-sizing: border-box;
			}

			.register .logo img {
				display: block;
			}

			.register .title {
				text-align: center;
			}

			.register .form-item {
				display: flex;
				align-items: center;
				flex-wrap: wrap;
				box-sizing: border-box;
			}

			.register .form-item input, .register .form-label {
				box-sizing: border-box;
			}

			.register .btn-submit {
				display: block;
				box-sizing: border-box;
			}

			.register form p.txt {
				width: 100%;
				margin: 0;
				box-sizing: border-box;
			}

			/* 移除表单灰色/白底背景，保留输入框白底 */
			.register form.login-form {
				background: transparent !important;
			}

			/* 页面切换过渡效果 */
			.page-transition-enter {
				opacity: 0;
				transform: translateY(20px);
			}

			.page-transition-enter-active {
				opacity: 1;
				transform: translateY(0);
				transition: opacity 0.3s ease, transform 0.3s ease;
			}
		</style>
		<!-- 优先加载关键CSS -->
		<link rel="stylesheet" type="text/css" href="../../layui/css/layui.css"/>
		<link rel="stylesheet" type="text/css" href="../../xznstatic/css/chaoxing-login.css"/>
	</head>
	<body>
		<!-- 骨架屏 -->
		<div id="skeleton" class="register" style="position: fixed; top: 0; left: 0; z-index: 9999;">
			<form class="layui-form login-form" style="padding: 20px; width: 400px; height: auto;">
				<div style="height: 20px; margin: 10px auto; width: 80%;" class="skeleton"></div>
				<div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
				<div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
				<div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
				<div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
				<div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
				<div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
				<div style="height: 44px; margin: 15px auto; width: 60%;" class="skeleton"></div>
				<div style="height: 20px; margin: 10px auto; width: 80%;" class="skeleton"></div>
			</form>
		</div>

		<script>
		(function(){
		  function showPage() {
			// 隐藏骨架屏
			var skeleton = document.getElementById('skeleton');
			if (skeleton) {
				skeleton.style.transition = 'opacity 0.3s ease';
				skeleton.style.opacity = '0';
				setTimeout(function() {
					skeleton.remove();
				}, 300);
			}
			// 显示页面
			document.body.classList.add('register-ready');
		  }

		  var done = false;
		  function tryShow() {
			if (done) return;
			done = true;
			setTimeout(showPage, 200);
		  }

		  if (document.readyState === 'complete') {
			tryShow();
		  } else {
			window.addEventListener('load', tryShow);
			setTimeout(tryShow, 3000);
		  }
		})();
		</script>
		<div class="register" id="app">
			<div class="login-container">
				<div class="login-header">
					<div class="login-logo">
						<i class="layui-icon layui-icon-app" style="font-size: 40px; color: white;"></i>
					</div>
					<h1 class="login-title">学生注册</h1>
					<p class="login-subtitle">智能化学习系统</p>
				</div>

				<form class="layui-form login-form" lay-filter="registerForm">
					<div class="form-group">
						<label><span style="color: red; margin-right: 3px;">*</span>学号</label>
						<div class="input-animation">
							<input type="text" id="xuehao" name="xuehao" placeholder="请输入学号" autocomplete="off" class="layui-input">
						</div>
					</div>

					<div class="form-group">
						<label><span style="color: red; margin-right: 3px;">*</span>密码</label>
						<div class="input-animation">
							<input type="password" name="mima" required lay-verify="required" placeholder="请输入密码" autocomplete="off" class="layui-input">
						</div>
					</div>

					<div class="form-group">
						<label><span style="color: red; margin-right: 3px;">*</span>姓名</label>
						<div class="input-animation">
							<input type="text" id="xingming" name="xingming" placeholder="请输入姓名" autocomplete="off" class="layui-input">
						</div>
					</div>

					<div class="form-group">
						<label>班级</label>
						<div class="input-animation">
							<input type="text" id="banji" name="banji" placeholder="请输入班级（1-50字符）" autocomplete="off" class="layui-input">
						</div>
					</div>

					<div class="form-group">
						<label><span style="color: red; margin-right: 3px;">*</span>手机</label>
						<div class="input-animation">
							<input type="text" id="shouji" name="shouji" placeholder="请输入手机" autocomplete="off" class="layui-input">
						</div>
					</div>

					<div class="form-group">
						<label><span style="color: red; margin-right: 3px;">*</span>邮箱</label>
						<div class="input-animation">
							<input type="text" id="youxiang" name="youxiang" placeholder="请输入邮箱" autocomplete="off" class="layui-input">
						</div>
					</div>

					<div class="form-group">
						<label><span style="color: red; margin-right: 3px;">*</span>人脸照片</label>
						<div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
							<input type="file" id="facePhoto" accept="image/jpeg,image/jpg,image/png" class="layui-input"
								   style="height: 54px; ">
							<img id="facePreview" style="max-width: 180px; margin-top: 10px; display: none; border-radius: 8px;">
						</div>
					</div>

					<button type="submit" class="btn-login" lay-submit lay-filter="register">
						<i class="layui-icon layui-icon-user-add" style="margin-right: 8px;"></i>
						注册
					</button>

					<div class="login-links">
						<a href="../login/login.html">已有账号？立即登录</a>
					</div>
				</form>
			</div>
		</div>

		<script src="../../layui/layui.js"></script>
		<script src="../../js/vue.js"></script>
		<!-- 组件配置信息 -->
		<script src="../../js/config.js"></script>

		<script>
			// Face photo preview
			document.getElementById('facePhoto').addEventListener('change', function(e) {
				const file = e.target.files[0];
				if (file) {
					const reader = new FileReader();
					reader.onload = function(event) {
						document.getElementById('facePreview').src = event.target.result;
						document.getElementById('facePreview').style.display = 'block';
					};
					reader.readAsDataURL(file);
				}
			});

			layui.use(['layer', 'form', 'http', 'jquery'], function() {
				var layer = layui.layer;
				var form = layui.form;
				var http = layui.http;
				var jquery = layui.jquery;

				var tablename = 'xuesheng';  // 固定使用xuesheng表名
				console.log('注册页面 tablename:', tablename);
				console.log('注册URL:', http.baseurl + tablename + '/register');

				// 注册
				form.on('submit(register)', function(data) {
					data = data.field;
                    if(!data.xuehao){
                        layer.msg('学号不能为空', {
							time: 2000,
							icon: 5
						});
                        return false
                    }
                    if(!data.mima){
                        layer.msg('密码不能为空', {
							time: 2000,
							icon: 5
						});
                        return false
                    }
					if(!isPassword(data.mima)){
						layer.msg('密码长度为6-20位', {
							time: 2000,
							icon: 5
						});
						return false;
					}
                    if(!data.xingming){
                        layer.msg('姓名不能为空', {
							time: 2000,
							icon: 5
						});
                        return false
                    }
					if(!isName(data.xingming)){
						layer.msg('姓名应为2-20个字符，支持中文或字母', {
							time: 2000,
							icon: 5
						});
						return false;
					}
					if(data.banji && !isClass(data.banji)){
						layer.msg('班级长度为1-50个字符', {
							time: 2000,
							icon: 5
						});
						return false;
					}
                    if(!isMobile(data.shouji)){
                        layer.msg('手机应输入手机格式', {
							time: 2000,
							icon: 5
						});
                        return false
                    }
                    if(!isEmail(data.youxiang)){
                        layer.msg('邮箱格式不正确或长度超过100字符', {
							time: 2000,
							icon: 5
						});
                        return false
                    }

					// Check if face photo is uploaded
					if (!document.getElementById('facePhoto').files[0]) {
						layer.msg('请上传人脸照片', {
							time: 2000,
							icon: 5
						});
						return false;
					}

					// Create FormData with all registration data and face photo
					var formData = new FormData();
					formData.append('xuehao', data.xuehao);
					formData.append('mima', data.mima);
					formData.append('xingming', data.xingming);
					formData.append('banji', data.banji);
					formData.append('shouji', data.shouji);
					formData.append('youxiang', data.youxiang);
					formData.append('facePhoto', document.getElementById('facePhoto').files[0]);

					// Submit registration with face photo
					jquery.ajax({
						url: http.baseurl + tablename + '/register',
						type: 'POST',
						data: formData,
						processData: false,
						contentType: false,
						success: function(res) {
							if (res.code === 0) {
								layer.msg('注册成功', {
									time: 2000,
									icon: 6
								}, function(){
									window.location.href = '../login/login.html';
								});
							} else {
								layer.msg(res.msg || '注册失败', {
									time: 2000,
									icon: 5
								});
							}
						},
						error: function() {
							layer.msg('注册失败，请重试', {
								time: 2000,
								icon: 5
							});
						}
					});

					return false
				});
			});
		</script>
	</body>
</html>
