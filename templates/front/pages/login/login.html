<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>智能化学习系统</title>
    <!-- 关键：首屏隐藏 #app，避免 CSS/JS 加载过程中的背景和布局闪现 -->
    <style type="text/css">
        /* 基础样式，确保背景和布局优先加载 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 预加载背景，确保背景图先加载 */
        body {
            background: linear-gradient(135deg, #1976d2 0%, #42a5f5 100%);
            background-attachment: fixed;
        }

        /* 骨架屏样式 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* 主容器样式 */
        #app {
            opacity: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            transition: opacity 0.3s ease-out;
        }

        body.login-ready #app {
            opacity: 1;
        }

        /* 统一背景，使用 !important 防止被 login.css 覆盖导致闪现 */
        .login {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            width: 100% !important;
            height: 100% !important;
            min-height: 100vh !important;
            background: linear-gradient(135deg, #1976d2 0%, #42a5f5 100%) !important;
            background-attachment: fixed !important;
        }

        .login form {
            box-sizing: border-box;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center !important;
            position: inherit;
        }

        .login .logo, .login .title {
            box-sizing: border-box;
        }

        .login .logo img {
            display: block;
        }

        .login .title {
            text-align: center;
        }

        .login .form-item {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            box-sizing: border-box;
        }

        .login .form-item input, .login .form-label {
            box-sizing: border-box;
        }

        .login .btn-submit {
            display: block;
            box-sizing: border-box;
        }

        .login form p.txt {
            width: 100%;
            margin: 0;
            box-sizing: border-box;
        }

        /* 移除表单灰色/白底背景，保留输入框白底 */
        .login form.login-form {
            background: transparent !important;
        }

        /* 页面切换过渡效果 */
        .page-transition-enter {
            opacity: 0;
            transform: translateY(20px);
        }

        .page-transition-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
    </style>
    <!-- 优先加载关键CSS -->
    <link rel="stylesheet" type="text/css" href="../../layui/css/layui.css"/>
    <link rel="stylesheet" type="text/css" href="../../xznstatic/css/chaoxing-login.css"/>
</head>
<body>
<!-- 骨架屏 -->
<div id="skeleton" class="login" style="position: fixed; top: 0; left: 0; z-index: 9999;">
    <form class="layui-form login-form" style="padding: 20px; width: 400px; height: auto;">
        <div style="height: 20px; margin: 10px auto; width: 80%;" class="skeleton"></div>
        <div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
        <div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
        <div style="height: 44px; margin: 15px auto; width: 80%;" class="skeleton"></div>
        <div style="height: 44px; margin: 15px auto; width: 60%;" class="skeleton"></div>
        <div style="height: 20px; margin: 10px auto; width: 80%;" class="skeleton"></div>
    </form>
</div>

<script>(function(){
  // 立即执行，在 DOM 解析前就运行
  document.documentElement.style.overflow = 'hidden';

  function showPage() {
    // 隐藏骨架屏
    var skeleton = document.getElementById('skeleton');
    if (skeleton) {
        skeleton.style.transition = 'opacity 0.3s ease';
        skeleton.style.opacity = '0';
        setTimeout(function() {
            skeleton.remove();
            document.documentElement.style.overflow = '';
        }, 300);
    }
    // 显示页面
    document.body.classList.add('login-ready');
  }

  // 监听所有资源加载完成
  if (document.readyState === 'complete') {
    showPage();
  } else {
    window.addEventListener('load', function() {
      // 延迟一点时间，确保所有资源都已就绪
      setTimeout(showPage, 100);
    });

    // 安全保障，即使某些资源加载失败也能显示页面
    setTimeout(showPage, 2000);
  }
})();
</script>
<div id="app" class="login">
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i class="layui-icon layui-icon-app" style="font-size: 40px; color: white;"></i>
            </div>
            <h1 class="login-title">登录</h1>
            <p class="login-subtitle">智能化学习系统</p>
        </div>

        <form class="layui-form login-form" lay-filter="loginForm">
            <input type="hidden" name="role" value="xuesheng">
            
            <div class="form-group">
                <label>账号</label>
                <div class="input-animation">
                    <input type="text" name="username" required lay-verify="required" placeholder="请输入账号" autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="form-group">
                <label>密码</label>
                <div class="input-animation">
                    <input type="password" name="password" required lay-verify="required" placeholder="请输入密码" autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="role-selector">
                <div class="role-option active" data-role="xuesheng">学生</div>
                <div class="role-option" data-role="jiaoshi">教师</div>
            </div>

            <button type="submit" class="btn-login" lay-submit lay-filter="login">
                <i class="layui-icon layui-icon-login-qq" style="margin-right: 8px;"></i>
                登录
            </button>

            <div class="login-links">
                <a href="javascript:registerClick('xuesheng')">注册学生账号</a>
                            <span style="margin: 0 10px;">|</span>
                            <a href="javascript:registerClick('jiaoshi')">注册教师账号</a>
                <span style="margin: 0 10px;">|</span>
                <a href="#">忘记密码</a>
            </div>
        </form>
    </div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../modules/http/http.js"></script>
<script type="text/javascript">
    // 页面跳转函数
    function jump(url) {
        if (!url || url == 'null' || url == null) {
            window.location.href = './index.html';
        }
        // 路径访问设置
        localStorage.setItem('iframeUrl', url.replace('../', './pages/'));
        // 添加页面过渡效果
        document.body.style.transition = 'opacity 0.3s ease';
        document.body.style.opacity = '0';
        // 延迟跳转，等待过渡效果完成
        setTimeout(function() {
            window.location.href = url;
        }, 300);
    }

    var vue = new Vue({
        el: '#app',
        data: {},
        methods: {
            jump(url) {
                jump(url)
            }
        }
    })

    layui.use(['layer', 'form', 'http', 'jquery'], function() {
        var layer = layui.layer;
        var form = layui.form;
        var http = layui.http;
        var $ = layui.jquery;

        // 自动填充账号密码（如果从注册页面传递了参数）
        function autoFillCredentials() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('username');
            const password = urlParams.get('password');

            if (username && password) {
                $('input[name="username"]').val(decodeURIComponent(username));
                $('input[name="password"]').val(decodeURIComponent(password));
                // 自动选择教师角色（因为是从教师注册页面过来的）
                $('.role-option[data-role="jiaoshi"]').click();
            }
        }

        // 角色选择
        $('.role-option').on('click', function() {
            $('.role-option').removeClass('active');
            $(this).addClass('active');
            var role = $(this).data('role');
            $('input[name="role"]').val(role);  // 设置隐藏字段的值
        });

        // 登录
        form.on('submit(login)', function(data) {
            data = data.field;
            if (!data.role) {
                layer.msg('请选择登录用户类型', {
                    time: 2000,
                    icon: 5
                });
                return false;
            }
            if (!data.username || data.username.trim().length < 4 || data.username.length > 30) {
                layer.msg('账号长度为4-30位', {
                    time: 2000,
                    icon: 5
                });
                return false;
            }
            if (!data.password || data.password.length < 6 || data.password.length > 20) {
                layer.msg('密码长度为6-20位', {
                    time: 2000,
                    icon: 5
                });
                return false;
            }
            http.request(data.role + '/login', 'get', data, function(res) {
                layer.msg('登录成功', {
                    time: 2000,
                    icon: 6
                });
                // 登录凭证
                localStorage.setItem('Token', res.token);
                localStorage.setItem('role', data.role === 'xuesheng' ? '学生' : '教师');
                // 当前登录用户角色
                localStorage.setItem('userTable', data.role);
                localStorage.setItem('sessionTable', data.role);
                // 用户名称
                localStorage.setItem('adminName', data.username);
                http.request(data.role + '/session', 'get', {}, function(res) {
                    // 用户id
                    localStorage.setItem('userid', res.data.id);
                    // 登录成功后强制跳转到首页，清除之前可能保存的个人中心等页面地址
                    localStorage.setItem('iframeUrl', './pages/home/home.html');
                    window.location.href = '../../index.html';
                })

            });
            return false
        });

        // 页面加载完成后自动填充账号密码
        $(document).ready(function() {
            autoFillCredentials();
        });

    });

    /**
     * 跳转注册
     * @param {Object} tablename
     */
    function registerClick(tablename) {
        window.location.href = '../' + tablename + '/register.html?tablename=' + tablename;
    }
</script>
</body>
</html>
