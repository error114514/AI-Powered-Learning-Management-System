			/* 防止 Vue 未加载时 {{projectName}}、{{item.name}} 等占位符闪现 */
			[v-cloak] { display: none !important; }

		<style>
			/* 超星学习通风格 - 蓝色调主题 */
			:root {
				--primary-color: #1e88e5;
				--primary-dark: #1565c0;
				--primary-light: #64b5f6;
				--secondary-color: #29b6f6;
				--accent-color: #0288d1;
				--text-primary: #ffffff;
				--text-secondary: #e0e0e0;
				--background-dark: #0d47a1;
				--background-light: #e3f2fd;
				--card-bg: rgba(255, 255, 255, 0.95);
				--shadow-color: rgba(0, 0, 0, 0.2);
			}

			/* 现代化导航栏样式 - 超星学习通风格 */
			#header {
				height: auto;
				background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
				border-bottom: 0;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				box-shadow: 0 4px 30px var(--shadow-color);
				z-index: 1000;
				transition: all 0.3s ease;
				backdrop-filter: blur(10px);
				background-color: var(--primary-color);
			}

			#header:hover {
				box-shadow: 0 8px 40px var(--shadow-color);
			}

			#header .nav-top {
				display: flex;
				align-items: center;
				padding: 0 30px;
				font-size: 16px;
				color: var(--text-primary);
				box-sizing: border-box;
				height: 80px;
				background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
				box-shadow: 0 1px 0px rgba(0,0,0,.1);
				justify-content: space-between;
				position: relative;
				backdrop-filter: blur(10px);
				border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			}

			#header .nav-top-img {
				width: 140px;
				height: 45px;
				padding: 0;
				margin: 0;
				border-radius: 8px;
				border-width: 0;
				border-style: solid;
				border-color: rgba(0,0,0,.3);
				box-shadow: 0 0 8px var(--shadow-color);
				transition: transform 0.3s ease, box-shadow 0.3s ease;
			}

			#header .nav-top-img:hover {
				transform: scale(1.05);
				box-shadow: 0 0 15px var(--shadow-color);
			}

			#header .nav-top-title {
				line-height: 45px;
				font-size: 32px;
				color: var(--text-primary);
				padding: 0 20px;
				margin: 0 20px;
				border-radius: 8px;
				border-width: 0px;
				border-style: solid;
				border-color: rgba(255, 255, 255, 0.3);
				box-shadow: 0 0 0px rgba(0,0,0,.3);
				font-weight: bold;
				text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
				transition: transform 0.3s ease, text-shadow 0.3s ease;
				font-family: 'Microsoft YaHei', sans-serif;
			}

			#header .nav-top-title:hover {
				transform: scale(1.02);
				text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
			}

			#header .nav-top-tel {
				line-height: 80px;
				font-size: 16px;
				color: var(--text-secondary);
				padding: 0 20px;
				margin: 0;
				border-radius: 8px;
				border-width: 0;
				border-style: solid;
				border-color: rgba(0,0,0,.3);
				box-shadow: 0 0 0px rgba(0,0,0,.3);
				opacity: 0.8;
				transition: opacity 0.3s ease;
			}

			#header .nav-top-tel:hover {
				opacity: 1;
			}

			#header .navs {
				display: flex;
				padding: 0 30px;
				align-items: center;
				box-sizing: border-box;
				height: 60px;
				background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
				box-shadow: 0 0px 0px rgba(0,0,0,0);
				justify-content: center;
				backdrop-filter: blur(10px);
				border-top: 1px solid rgba(255, 255, 255, 0.1);
			}
			#header .navs .title {
				width: auto;
				line-height: 40px;
				font-size: 16px;
				color: var(--text-primary);
				padding: 0px 0px 0px 0px;
				margin: 0px 0px 0px 0px;
				border-radius: 6px;
				border-width: 0;
				border-style: solid;
				border-color: rgba(0,0,0,.3);
				box-shadow: 0 0 6px rgba(0,0,0,0);
			}
			#header .navs li {
				display: inline-block;
				width: auto;
				line-height: 40px;
				padding: 0 15px;
				margin: 0 8px 0 0px;
				color: var(--text-primary);
				font-size: 16px;
				border-radius: 8px;
				border-width: 0;
				border-style: solid;
				border-color: rgba(0,0,0,.3);
				background-color: rgba(255, 255, 255, 0.1);
				box-shadow: 0 0 8px var(--shadow-color);
				transition: all 0.3s ease;
				backdrop-filter: blur(10px);
				position: relative;
				overflow: hidden;
			}
			#header .navs li::before {
				content: '';
				position: absolute;
				top: 0;
				left: -100%;
				width: 100%;
				height: 100%;
				background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
				transition: left 0.5s;
			}
			#header .navs li:hover::before {
				left: 100%;
			}
			#header .navs li a{
				color: inherit;
				text-decoration: none;
				position: relative;
				z-index: 1;
			}
			#header .navs li.current a{
				color: inherit;
			}
			#header .navs li a:hover{
				color: inherit;
			}
			/* 选中状态 - 使用深蓝色背景 + 底部边框 */
			#header .navs li.current {
				color: var(--text-primary);
				font-size: 16px;
				border-radius: 8px;
				border-width: 0;
				border-bottom: 3px solid var(--text-primary);
				background-color: rgba(255, 255, 255, 0.25);
				box-shadow: 0 4px 15px var(--shadow-color);
				transform: scale(1.05);
			}

			/* 悬停状态 - 半透明白色背景 */
			#header .navs li:hover {
				color: var(--text-primary);
				font-size: 16px;
				border-radius: 8px;
				border-width: 0;
				border-bottom: 3px solid rgba(255, 255, 255, 0.5);
				background-color: rgba(255, 255, 255, 0.2);
				box-shadow: 0 6px 20px var(--shadow-color);
				transform: scale(1.05);
			}

			/* 动画效果 */
			@keyframes slideInDown {
				from {
					transform: translateY(-100%);
					opacity: 0;
				}
				to {
					transform: translateY(0);
					opacity: 1;
				}
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}

			@keyframes pulse {
				0% {
					box-shadow: 0 0 0 0 rgba(30, 136, 229, 0.7);
				}
				70% {
					box-shadow: 0 0 0 10px rgba(30, 136, 229, 0);
				}
				100% {
					box-shadow: 0 0 0 0 rgba(30, 136, 229, 0);
				}
			}

			@keyframes float {
				0% {
					transform: translateY(0px);
				}
				50% {
					transform: translateY(-10px);
				}
				100% {
					transform: translateY(0px);
				}
			}

			#header {
				animation: slideInDown 0.6s ease-out;
			}

			#header .navs li {
				animation: fadeIn 0.6s ease-out forwards;
				opacity: 0;
			}

			#header .navs li:nth-child(1) { animation-delay: 0.1s; }
			#header .navs li:nth-child(2) { animation-delay: 0.2s; }
			#header .navs li:nth-child(3) { animation-delay: 0.3s; }
			#header .navs li:nth-child(4) { animation-delay: 0.4s; }
			#header .navs li:nth-child(5) { animation-delay: 0.5s; }
			#header .navs li:nth-child(6) { animation-delay: 0.6s; }
			#header .navs li:nth-child(7) { animation-delay: 0.7s; }

			/* 底部标签栏样式 */
			#tabbar {
				position: fixed;
				bottom: 0;
				left: 0;
				width: 100%;
				background: linear-gradient(to top, var(--primary-dark), var(--primary-color));
				color: var(--text-primary);
				padding: 20px 0;
				text-align: center;
				box-shadow: 0 -4px 20px var(--shadow-color);
				z-index: 999;
				backdrop-filter: blur(10px);
			}

			#tabbar .company {
				font-size: 16px;
				font-weight: bold;
				margin-bottom: 10px;
				text-shadow: 1px 1px 2px var(--shadow-color);
				opacity: 0.9;
			}

			#tabbar .record {
				font-size: 14px;
				opacity: 0.8;
				margin-bottom: 10px;
			}

			#tabbar .desc {
				font-size: 14px;
				line-height: 1.6;
				opacity: 0.7;
				max-width: 800px;
				margin: 0 auto;
				padding: 0 20px;
			}

			/* 响应式设计 */
			@media (max-width: 768px) {
				#header .nav-top {
					height: 60px;
					padding: 0 15px;
				}
				#header .nav-top-title {
					font-size: 24px;
					padding: 0 10px;
					margin: 0 10px;
				}
				#header .navs {
					height: 50px;
					padding: 0 15px;
				}
				#header .navs li {
					font-size: 14px;
					padding: 0 8px;
					margin: 0 4px;
				}
				#tabbar {
					font-size: 12px;
					padding: 15px 0;
				}
				#tabbar .desc {
					font-size: 12px;
					padding: 0 10px;
				}
			}

			/* 加载动画 */
			.loading-spinner {
				border: 3px solid rgba(255, 255, 255, 0.3);
				border-radius: 50%;
				border-top: 3px solid var(--text-primary);
				width: 30px;
				height: 30px;
				animation: spin 1s linear infinite;
				margin: 0 auto;
			}

			@keyframes spin {
				0% { transform: rotate(0deg); }
				100% { transform: rotate(360deg); }
			}

			/* 按钮样式 */
			.btn-primary {
				background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
				color: var(--text-primary);
				border: none;
				padding: 10px 20px;
				border-radius: 25px;
				font-size: 16px;
				cursor: pointer;
				transition: all 0.3s ease;
				box-shadow: 0 4px 15px var(--shadow-color);
			}

			.btn-primary:hover {
				transform: translateY(-2px);
				box-shadow: 0 6px 20px var(--shadow-color);
				background: linear-gradient(135deg, var(--primary-light), var(--secondary-color));
			}

			/* 卡片样式 */
			.card {
				background: var(--card-bg);
				border-radius: 12px;
				box-shadow: 0 8px 25px var(--shadow-color);
				transition: all 0.3s ease;
				overflow: hidden;
			}

			.card:hover {
				transform: translateY(-5px);
				box-shadow: 0 12px 30px var(--shadow-color);
			}
		</style>
